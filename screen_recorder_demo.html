
<style>
  .recorder-wrap { padding: 1.5rem 0; font-family: var(--font-sans); font-size: 24px; }
  .status-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 19.5px; padding: 6px 18px; border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
  .status-badge.recording { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
  .status-badge.ready { background: #EAF3DE; color: #3B6D11; border-color: #97C459; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }
  .dot.blink { animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .ctrl-row { display: flex; align-items: center; gap: 10px; margin: 1.25rem 0; flex-wrap: wrap; }
  .select-row { display: flex; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .select-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
  label.field-label { font-size: 18px; color: var(--color-text-secondary); }
  select { font-size: 18px; }
  button { font-size: 18px; }
  .log-box { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 18px; font-family: var(--font-mono); color: var(--color-text-secondary); min-height: 60px; max-height: 140px; overflow-y: auto; }
  .log-line { margin: 2px 0; }
  .preview-wrap { margin-top: 1rem; }
  video { width: 100%; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: #000; display: none; }
  video.visible { display: block; }
</style>

<div class="recorder-wrap">
  <h2 class="sr-only">螢幕錄影工具示範</h2>

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem;">
    <span id="statusBadge" class="status-badge"><span class="dot"></span> 等待開始</span>
    <span id="timer" style="font-size:21px; font-weight:500; color:var(--color-text-secondary); font-family:var(--font-mono);">00:00</span>
  </div>

  <div class="select-row">
    <div class="select-group">
      <label class="field-label">解析度</label>
      <select id="resSelect">
        <option value="720">720p (1280×720)</option>
        <option value="1080" selected>1080p (1920×1080)</option>
      </select>
    </div>
    <div class="select-group">
      <label class="field-label">錄製來源</label>
      <select id="srcSelect">
        <option value="screen">整個螢幕</option>
        <option value="window">應用程式視窗</option>
        <option value="tab">瀏覽器分頁</option>
      </select>
    </div>
    <div class="select-group">
      <label class="field-label">包含麥克風</label>
      <select id="micSelect">
        <option value="false">否（僅螢幕聲音）</option>
        <option value="true">是</option>
      </select>
    </div>
  </div>

  <div class="ctrl-row">
    <button id="btnStart" onclick="startRec()"><i class="ti ti-player-record" aria-hidden="true"></i> 開始錄影</button>
    <button id="btnStop" onclick="stopRec()" disabled><i class="ti ti-player-stop" aria-hidden="true"></i> 停止錄影</button>
  </div>

  <div class="log-box" id="logBox">
    <div class="log-line" style="color:var(--color-text-tertiary)">→ 按「開始錄影」，瀏覽器會要求選擇螢幕來源</div>
  </div>

  <div class="preview-wrap">
    <video id="preview" controls></video>
  </div>
</div>

<script>
let mediaRecorder, chunks = [], stream, timerInterval, seconds = 0;

function log(msg) {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.textContent = '→ ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function getFilename() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const date = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const seq = pad(Math.floor(Math.random() * 90) + 10);
  return `REC_${date}_${seq}.mp4`;
}

function setStatus(text, cls) {
  const b = document.getElementById('statusBadge');
  b.className = 'status-badge' + (cls ? ' ' + cls : '');
  const dot = document.createElement('span');
  dot.className = 'dot' + (cls === 'recording' ? ' blink' : '');
  b.innerHTML = '';
  b.appendChild(dot);
  b.append(' ' + text);
}

function startTimer() {
  seconds = 0;
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}

async function startRec() {
  const res = document.getElementById('resSelect').value;
  const mic = document.getElementById('micSelect').value === 'true';
  const height = parseInt(res);
  const width = height === 720 ? 1280 : 1920;

  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { width, height, frameRate: 30 },
      audio: true
    });

    if (mic) {
      const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      micStream.getAudioTracks().forEach(t => stream.addTrack(t));
    }

    const mimeTypes = ['video/mp4', 'video/webm;codecs=h264', 'video/webm'];
    const mime = mimeTypes.find(t => MediaRecorder.isTypeSupported(t)) || '';

    chunks = [];
    mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = saveFile;
    mediaRecorder.start(1000);

    startTimer();
    setStatus('錄影中', 'recording');
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    log(`開始錄影（${width}×${height}，${mime || '瀏覽器預設格式'}）`);

    stream.getVideoTracks()[0].onended = () => stopRec();

  } catch(e) {
    log('錯誤：' + e.message);
    setStatus('錯誤', '');
  }
}

function stopRec() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    stream.getTracks().forEach(t => t.stop());
    clearInterval(timerInterval);
    setStatus('處理中...', '');
    document.getElementById('btnStop').disabled = true;
    log('停止錄影，正在打包檔案...');
  }
}

function saveFile() {
  const filename = getFilename();
  const blob = new Blob(chunks, { type: 'video/mp4' });
  const url = URL.createObjectURL(blob);

  const vid = document.getElementById('preview');
  vid.src = url;
  vid.className = 'visible';

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();

  setStatus('完成', 'ready');
  document.getElementById('btnStart').disabled = false;
  log(`已儲存：${filename}`);
}
</script>
